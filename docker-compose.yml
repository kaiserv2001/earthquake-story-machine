# Local dev stack for the Earthquake Story Machine.
# Brings up the three Azure dependencies the Functions host needs locally:
#   - azurite              : Blob/Queue/Table storage emulator (BlobStorageConnection, AzureWebJobsStorage)
#   - mssql                : SQL Server for QuakeDb (SqlConnection)
#   - servicebus-emulator  : Service Bus with the quake-events queue (ServiceBusConnection)
#   - servicebus-sql       : SQL Server backing store the emulator requires (internal use only)
#
# Dev-only passwords come from .env (see .env.example). Never commit a real .env.
# Quick start: docs in README.md ("Local development").
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: quake-azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --skipApiVersionCheck"
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 5

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quake-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Dedicated SQL Server the Service Bus emulator uses for its own internal state.
  # Kept separate from `mssql` so the emulator never contends with QuakeDb.
  servicebus-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quake-sb-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    container_name: quake-servicebus
    ports:
      - "5672:5672"  # AMQP
      - "5300:5300"  # emulator HTTP
    environment:
      ACCEPT_EULA: "Y"
      SQL_SERVER: servicebus-sql
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
    volumes:
      - ./infra/servicebus-emulator/config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    depends_on:
      servicebus-sql:
        condition: service_healthy

volumes:
  azurite-data:
  mssql-data:
