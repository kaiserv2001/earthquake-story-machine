name: Deploy

# Deploys infra, the Functions app, and the Static Web App on push to main.
# Real deployment requires an Azure subscription and the secrets listed below; it runs
# only when those secrets are configured. All credentials come from GitHub secrets —
# never from literals in the repo.
#
# Required repository secrets:
#   AZURE_CREDENTIALS                  - OIDC / service-principal JSON for azure/login
#   AZURE_SUBSCRIPTION_ID              - target subscription
#   AZURE_RESOURCE_GROUP               - e.g. rg-quakestory
#   UNSPLASH_ACCESS_KEY                - Unsplash API key (-> Function App UnsplashAccessKey)
#   SQL_ADMIN_PASSWORD                 - Azure SQL admin password
#   AZURE_STATIC_WEB_APPS_API_TOKEN    - SWA deploy token

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: Provision infrastructure (Bicep)
    runs-on: ubuntu-latest
    # Real Azure work runs only when credentials are present; otherwise this is a no-op
    # so the workflow stays green offline / on forks.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    outputs:
      functionAppName: ${{ steps.deploy.outputs.functionAppName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >-
            unsplashAccessKey=${{ secrets.UNSPLASH_ACCESS_KEY }}
            sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}

  deploy-functions:
    name: Deploy Functions app
    runs-on: ubuntu-latest
    needs: provision
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Publish Functions
        run: dotnet publish src/Quake.Functions/Quake.Functions.csproj --configuration Release --output ./publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ needs.provision.outputs.functionAppName }}
          package: ./publish

  deploy-frontend:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend
          skip_app_build: true
